<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 19: Memory Card Flip Game</title>
    <a href="index.html">← Trang Chủ</a>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --bg-color: #ecf0f1;
            --card-bg: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: var(--secondary-color);
        }

        /* --- CSS Grid Layout --- */
        main.game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Mobile: 2 cột */
            gap: 15px;
            width: 100%;
            max-width: 600px;
            perspective: 1000px; /* Cần thiết cho hiệu ứng 3D */
        }

        /* Desktop: 4 cột */
        @media (min-width: 600px) {
            main.game-board {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* --- 3D Flip Animation --- */
        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4; /* Giữ tỷ lệ hình chữ nhật cho thẻ */
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        .card:active {
            transform: scale(0.97);
            transition: transform 0.2s;
        }

        .card.flip {
            transform: rotateY(180deg);
        }

        .front-face, .back-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Mặt trước (có hình, ban đầu bị ẩn do lật) */
        .front-face {
            background-color: var(--card-bg);
            transform: rotateY(180deg);
        }

        /* Mặt sau (Mặt úp có dấu chấm hỏi) */
        .back-face {
            background-color: var(--primary-color);
            color: white;
            transition: background-color 0.3s;
        }

        /* Hover effect */
        .card:hover .back-face {
            background-color: var(--secondary-color);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <header>
        <h1>Memory Matching Game</h1>
        <div class="controls">
            <div>Số lượt: <span id="moves">0</span></div>
            <button onclick="resetGame()">Chơi lại</button>
        </div>
    </header>

    <main class="game-board" id="game-board">
        </main>

    <script>
        const gameBoard = document.getElementById('game-board');
        const movesDisplay = document.getElementById('moves');

        // Danh sách các icon/hình ảnh cho 4 cặp thẻ (8 thẻ)
        const icons = ['🍎', '🍌', '🍇', '🍉'];
        let cardsArray = [...icons, ...icons]; // Nhân đôi để tạo thành cặp

        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        // Khởi tạo game
        function initGame() {
            // Shuffle mảng (Trộn bài)
            cardsArray.sort(() => 0.5 - Math.random());

            // Xóa board cũ
            gameBoard.innerHTML = '';
            
            // Tạo các thẻ HTML
            cardsArray.forEach(icon => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.icon = icon;

                cardElement.innerHTML = `
                    <div class="front-face">${icon}</div>
                    <div class="back-face">?</div>
                `;

                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        // Logic lật thẻ
        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            // Lần lật thẻ đầu tiên
            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // Lần lật thẻ thứ hai
            secondCard = this;
            moves++;
            movesDisplay.textContent = moves;

            checkForMatch();
        }

        // Kiểm tra xem 2 thẻ có khớp không
        function checkForMatch() {
            let isMatch = firstCard.dataset.icon === secondCard.dataset.icon;

            if (isMatch) {
                disableCards();
                matchedPairs++;
                
                // Kiểm tra điều kiện thắng (Đã tìm đủ 4 cặp)
                if (matchedPairs === 4) {
                    setTimeout(() => {
                        alert(`Chúc mừng! Bạn đã hoàn thành trò chơi với ${moves} lượt!`);
                    }, 500);
                }
            } else {
                unflipCards();
            }
        }

        // Nếu khớp: Vô hiệu hóa click trên 2 thẻ này
        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            resetBoard();
        }

        // Nếu không khớp: Úp thẻ lại sau 1 khoảng thời gian
        function unflipCards() {
            lockBoard = true; // Khóa bảng để không cho lật thẻ thứ 3

            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1000);
        }

        // Đặt lại các biến state
        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // Chơi lại từ đầu
        function resetGame() {
            moves = 0;
            matchedPairs = 0;
            movesDisplay.textContent = moves;
            resetBoard();
            initGame();
        }

        // Chạy game khi trang vừa tải xong
        initGame();
    </script>
</body>
</html>
